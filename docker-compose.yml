version: "3.9"

# ── Two modes ──────────────────────────────────────────────────────────────────
#
# Mode A — Direct (Python app → Dynatrace)
#   sample-app and load-generator send OTLP logs (profiling) and OTLP traces
#   directly to DT_ENDPOINT. Trace correlation is enabled out of the box:
#   profile samples captured during each request are tagged with traceId/spanId.
#
# Mode B — Collector pipeline (any language → OTel Collector → Dynatrace)
#   Language-agnostic: any app pushes pprof/OTLP to the collector,
#   which normalises and forwards to Dynatrace.
#   Point DT_ENDPOINT in sample-app to http://otel-collector:4318.
#
# Development mode (no DT tenant yet)
#   Set DT_ENDPOINT=http://validator:8888 — profiling logs go to the validator,
#   traces fall back to stdout (ConsoleSpanExporter).
#
# Required API token scopes: logs.ingest, openTelemetryTrace.ingest

services:

  # ── Sample application ──────────────────────────────────────────────────────
  # Exports two signals to DT_ENDPOINT:
  #   OTLP Logs  → /api/v2/otlp/v1/logs   (profiling data, one record per stack)
  #   OTLP Traces → /api/v2/otlp/v1/traces (one span per HTTP request)
  # Profile records carry traceId/spanId so they link to their request trace.
  sample-app:
    build:
      context: .
      dockerfile: sample-app/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DT_ENDPOINT=${DT_ENDPOINT}
      - DT_API_TOKEN=${DT_API_TOKEN}
      - OTEL_SERVICE_NAME=profiling-demo-app
      - OTEL_SERVICE_VERSION=1.0.0
      - DEPLOYMENT_ENV=poc
      # Profiler tuning
      - PROFILER_SAMPLE_INTERVAL_MS=10     # stack snapshot every 10ms
      - PROFILER_FLUSH_INTERVAL_S=30       # export window every 30s
    depends_on:
      - validator
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Continuous load generator ───────────────────────────────────────────────
  # Creates a root OTel span per request and injects W3C traceparent into the
  # outgoing HTTP call. The sample-app continues the trace as a child server
  # span — both ends share the same trace ID, which the profiler tags samples with.
  # Trace ID is logged on every request line for easy copy-paste into DQL.
  load-generator:
    build: ./load-generator
    environment:
      - TARGET_URL=http://sample-app:8080
      - REQUESTS_PER_SECOND=3
      - DT_ENDPOINT=${DT_ENDPOINT}
      - DT_API_TOKEN=${DT_API_TOKEN}
      - OTEL_SERVICE_NAME=load-generator
      - OTEL_SERVICE_VERSION=1.0.0
    depends_on:
      sample-app:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── OTel Collector (language-agnostic pipeline) ─────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./collector/config.yaml:/etc/otel/config.yaml:ro
    environment:
      - DT_ENDPOINT=${DT_ENDPOINT}
      - DT_API_TOKEN=${DT_API_TOKEN}
    ports:
      - "4317:4317"   # OTLP gRPC  (any language → collector)
      - "4318:4318"   # OTLP HTTP  (any language → collector)
      - "4040:4040"   # pprof push (Go/Java/Python native profilers)
      - "13133:13133" # collector health check
    depends_on:
      - validator
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Local OTLP profile validator ────────────────────────────────────────────
  # Mimics the Dynatrace OTLP profiles endpoint.
  # Decodes incoming payloads and prints flame-graph-style hotspot summaries.
  # Use this to verify payload shape before pointing at a real DT tenant.
  validator:
    build: ./validator
    ports:
      - "8888:8888"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
